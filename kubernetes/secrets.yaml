# IMPORTANT: This file is a TEMPLATE. In production:
# 1. Do NOT commit secrets to git
# 2. Use AWS Secrets Manager, HashiCorp Vault, or sealed-secrets
# 3. Create secrets manually or via CI/CD pipeline
# 4. Add secrets.yaml to .gitignore

apiVersion: v1
kind: Secret
metadata:
  name: ledgr-secrets
  namespace: ledgr
  labels:
    app: ledgr
    component: secrets
type: Opaque
stringData:
  # Database credentials
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: "change-me-in-production"
  DATABASE_URL: "postgresql://postgres:change-me-in-production@postgres-service.ledgr.svc.cluster.local:5432/ledgr"

  # Redis credentials
  REDIS_PASSWORD: "change-me-in-production"
  REDIS_URL: "redis://:change-me-in-production@redis-service.ledgr.svc.cluster.local:6379"

  # JWT Secret
  JWT_SECRET: "change-me-very-long-random-secret-string"

  # Pinecone API key
  PINECONE_API_KEY: "change-me-pinecone-api-key"

  # AWS credentials (if using AWS S3, RDS, ECR)
  AWS_ACCESS_KEY_ID: "AKIA..."
  AWS_SECRET_ACCESS_KEY: "change-me-aws-secret-key"
  AWS_REGION: "us-east-1"

  # Sendgrid/Email API
  SENDGRID_API_KEY: "SG.change-me-sendgrid-key"

  # Third-party API keys
  STRIPE_SECRET_KEY: "sk_live_change-me"
  STRIPE_PUBLIC_KEY: "pk_live_change-me"

---
apiVersion: v1
kind: Secret
metadata:
  name: docker-registry-secret
  namespace: ledgr
  labels:
    app: ledgr
    component: registry
type: kubernetes.io/dockercfg
data:
  # Base64 encoded ~/.docker/config.json
  # Create with: kubectl create secret docker-registry docker-registry-secret \
  #   --docker-server=<your-ecr-url> \
  #   --docker-username=<aws> \
  #   --docker-password=<ecr-token> \
  #   -n ledgr
  .dockercfg: changeme

---
apiVersion: v1
kind: Secret
metadata:
  name: tls-certificate
  namespace: ledgr
  labels:
    app: ledgr
    component: tls
type: kubernetes.io/tls
data:
  # Generated via: 
  # openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
  #   -keyout tls.key -out tls.crt -subj "/CN=ledgr.example.com"
  tls.crt: LS0tLS1CRUdJTi... # base64 encoded cert
  tls.key: LS0tLS1CRUdJTi... # base64 encoded key
