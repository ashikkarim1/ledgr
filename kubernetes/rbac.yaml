apiVersion: v1
kind: ServiceAccount
metadata:
  name: ledgr-frontend
  namespace: ledgr
  labels:
    app: ledgr
    component: frontend

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ledgr-backend
  namespace: ledgr
  labels:
    app: ledgr
    component: backend

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ledgr-frontend-role
  namespace: ledgr
spec:
  rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
    resourceNames: ["ledgr-tls-cert"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ledgr-backend-role
  namespace: ledgr
spec:
  rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
    resourceNames: ["ledgr-secrets"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ledgr-frontend-rolebinding
  namespace: ledgr
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ledgr-frontend-role
subjects:
- kind: ServiceAccount
  name: ledgr-frontend
  namespace: ledgr

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ledgr-backend-rolebinding
  namespace: ledgr
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ledgr-backend-role
subjects:
- kind: ServiceAccount
  name: ledgr-backend
  namespace: ledgr
