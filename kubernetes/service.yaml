apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: ledgr
  labels:
    app: ledgr
    component: frontend
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
spec:
  type: LoadBalancer
  selector:
    app: ledgr
    component: frontend
  ports:
  - name: http
    port: 80
    targetPort: 80
    protocol: TCP
  - name: https
    port: 443
    targetPort: 443
    protocol: TCP
  sessionAffinity: None
  externalTrafficPolicy: Local

---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: ledgr
  labels:
    app: ledgr
    component: backend
spec:
  type: ClusterIP
  selector:
    app: ledgr
    component: backend
  ports:
  - name: http
    port: 3000
    targetPort: 3000
    protocol: TCP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600

---
apiVersion: v1
kind: Service
metadata:
  name: backend-headless
  namespace: ledgr
  labels:
    app: ledgr
    component: backend
spec:
  clusterIP: None
  type: ClusterIP
  selector:
    app: ledgr
    component: backend
  ports:
  - name: http
    port: 3000
    targetPort: 3000
    protocol: TCP

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: ledgr
  labels:
    app: ledgr
    component: database
spec:
  type: ClusterIP
  selector:
    app: ledgr
    component: database
  ports:
  - name: postgresql
    port: 5432
    targetPort: 5432
    protocol: TCP

---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: ledgr
  labels:
    app: ledgr
    component: cache
spec:
  type: ClusterIP
  selector:
    app: ledgr
    component: cache
  ports:
  - name: redis
    port: 6379
    targetPort: 6379
    protocol: TCP

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-service
  namespace: ledgr
  labels:
    app: ledgr
    component: monitoring
spec:
  type: ClusterIP
  selector:
    app: ledgr
    component: prometheus
  ports:
  - name: prometheus
    port: 9090
    targetPort: 9090
    protocol: TCP

---
apiVersion: v1
kind: Service
metadata:
  name: grafana-service
  namespace: ledgr
  labels:
    app: ledgr
    component: monitoring
spec:
  type: LoadBalancer
  selector:
    app: ledgr
    component: grafana
  ports:
  - name: grafana
    port: 3000
    targetPort: 3000
    protocol: TCP
