apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: 15s

  - name: PostgreSQL
    type: postgres
    access: proxy
    url: postgres:5432
    database: ledgr
    user: postgres
    password: postgres
    sslMode: disable
    editable: true
    jsonData:
      postgresVersion: 1600
      minInterval: 1m
      timeInterval: 1m

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: true
    jsonData:
      maxLines: 1000
