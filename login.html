<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In to Ledgr</title>
  <meta name="description" content="Sign in to your Ledgr account to access real-time UAE accounting compliance and AI-supervised books." />
  <link rel="stylesheet" href="assets/styles.css" />
  <script src="assets/config.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f9f9f9;
      margin: 0;
      padding: 0;
    }

    .login-container {
      max-width: 500px;
      margin: 0 auto;
      padding: 40px 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .login-card {
      background: white;
      border-radius: 12px;
      padding: 40px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    }

    .login-header {
      margin-bottom: 30px;
      text-align: center;
    }

    .login-logo {
      font-size: 32px;
      font-weight: 700;
      color: #FF5C00;
      margin-bottom: 16px;
    }

    .login-header h1 {
      color: #191919;
      font-size: 24px;
      font-weight: 700;
      margin: 0 0 8px 0;
    }

    .login-header p {
      color: #999999;
      font-size: 14px;
      margin: 0;
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-group label {
      color: #191919;
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-group input {
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 16px;
      font-family: inherit;
      transition: all 0.3s ease;
      color: #191919;
    }

    .form-group input:focus {
      outline: none;
      border-color: #FF5C00;
      box-shadow: 0 0 0 3px rgba(255, 92, 0, 0.1);
    }

    .form-group input::placeholder {
      color: #999999;
    }

    .btn--login {
      background: linear-gradient(135deg, #FF5C00 0%, #ff7a33 100%);
      color: white;
      border: none;
      padding: 14px 24px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      width: 100%;
    }

    .btn--login:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(255, 92, 0, 0.3);
    }

    .btn--login:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn--login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .error-message {
      background: #ffe9ec;
      color: #ff405d;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
      margin-bottom: 20px;
    }

    .error-message.show {
      display: block;
    }

    .success-message {
      background: #dcf0eb;
      color: #0b6e54;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
      margin-bottom: 20px;
    }

    .success-message.show {
      display: block;
    }

    .loading {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo">L</div>
        <h1>Sign in to Ledgr</h1>
        <p>Access your AI-powered accounting dashboard</p>
      </div>

      <div class="error-message" id="errorMessage"></div>
      <div class="success-message" id="successMessage"></div>

      <form class="login-form" id="loginForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            required
            value="tester@ledgr.ae"
          />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            required
            value="tester"
          />
        </div>

        <button type="submit" class="btn--login" id="submitBtn">
          Sign in to your account
        </button>
      </form>

      <div style="margin-top: 24px; text-align: center; font-size: 12px; color: #999999;">
        Demo credentials pre-filled for testing
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const submitBtn = document.getElementById('submitBtn');
    const errorMessage = document.getElementById('errorMessage');
    const successMessage = document.getElementById('successMessage');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      // Clear messages
      errorMessage.classList.remove('show');
      successMessage.classList.remove('show');

      const email = emailInput.value;
      const password = passwordInput.value;

      // Show loading state
      const originalText = submitBtn.textContent;
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="loading"></span>Signing in...';

      try {
        const response = await fetch(window.LedgrConfig.auth.login(), {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Accept': 'application/json',
          },
          credentials: 'include',
          body: JSON.stringify({
            email: email,
            password: password,
          }),
        });

        const data = await response.json();

        if (!response.ok || !data.success) {
          throw new Error(data.errors?.[0]?.message || 'Sign in failed. Please check your credentials.');
        }

        // Store tokens
        localStorage.setItem(window.LedgrConfig.storage.accessToken, data.data.access_token);
        localStorage.setItem(window.LedgrConfig.storage.refreshToken, data.data.refresh_token);
        localStorage.setItem(window.LedgrConfig.storage.userId, data.data.user_id);
        localStorage.setItem(window.LedgrConfig.storage.workspaceId, data.data.workspace_id);

        // Show success message
        successMessage.textContent = 'Sign in successful! Redirecting to dashboard...';
        successMessage.classList.add('show');

        // Redirect after a short delay
        setTimeout(() => {
          window.location.href = '/dashboard.html';
        }, 1500);

      } catch (error) {
        console.error('Login error:', error);
        let errorText = error.message;
        
        // Check if it's a network error
        if (error instanceof TypeError) {
          errorText = `Network error: Cannot reach backend server at ${window.LedgrConfig.apiEndpoint}. Make sure the backend is running.`;
        }
        
        errorMessage.textContent = errorText;
        errorMessage.classList.add('show');

        submitBtn.disabled = false;
        submitBtn.textContent = originalText;
      }
    });
  </script>
</body>
</html>
