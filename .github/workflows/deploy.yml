name: CI/CD Pipeline - Build & Deploy

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  FRONTEND_IMAGE: ledgr/frontend
  BACKEND_IMAGE: ledgr/backend

jobs:
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Run ESLint
        run: npx eslint src/ --ext .ts,.tsx,.js
        continue-on-error: true
      
      - name: Run TypeScript compiler
        run: npx tsc --noEmit
        continue-on-error: true
      
      - name: Run security audit
        run: npm audit --audit-level=moderate
        continue-on-error: true
      
      - name: SonarQube Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        continue-on-error: true

  tests:
    name: Tests
    runs-on: ubuntu-latest
    needs: code-quality
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ledgr_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Setup test database
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ledgr_test
        run: npm run db:migrate
        continue-on-error: true
      
      - name: Run unit tests
        run: npm run test:unit
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ledgr_test
          REDIS_URL: redis://localhost:6379
        continue-on-error: true
      
      - name: Run integration tests
        run: npm run test:integration
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ledgr_test
          REDIS_URL: redis://localhost:6379
        continue-on-error: true
      
      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage/coverage-final.json
          flags: unittests
          name: codecov-umbrella
        continue-on-error: true

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: tests
    permissions:
      contents: read
      id-token: write
    
    outputs:
      frontend-image: ${{ steps.image.outputs.frontend }}
      backend-image: ${{ steps.image.outputs.backend }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Output image tags
        id: image
        run: |
          echo "frontend=${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "backend=${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}" >> $GITHUB_OUTPUT

  security-scan:
    name: Container Security Scan
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.build.outputs.frontend-image }}
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [ build, security-scan ]
    if: github.ref == 'refs/heads/main'
    environment: staging
    permissions:
      contents: read
      id-token: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ secrets.EKS_CLUSTER_NAME_STAGING }} \
            --region ${{ env.AWS_REGION }}
      
      - name: Deploy to Kubernetes
        env:
          KUBE_NAMESPACE: ledgr-staging
          FRONTEND_IMAGE: ${{ needs.build.outputs.frontend-image }}
          BACKEND_IMAGE: ${{ needs.build.outputs.backend-image }}
        run: |
          kubectl set image deployment/frontend \
            frontend=${{ env.FRONTEND_IMAGE }} \
            -n ${{ env.KUBE_NAMESPACE }} --record
          
          kubectl set image deployment/backend \
            backend=${{ env.BACKEND_IMAGE }} \
            -n ${{ env.KUBE_NAMESPACE }} --record
      
      - name: Wait for deployment
        run: |
          kubectl rollout status deployment/frontend \
            -n ledgr-staging --timeout=10m
          kubectl rollout status deployment/backend \
            -n ledgr-staging --timeout=10m
      
      - name: Run smoke tests
        run: |
          kubectl run test-pod --rm -i --restart=Never \
            --image=curlimages/curl -- curl http://frontend/health

  approve-production:
    name: Approve Production Deployment
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    
    steps:
      - name: Request approval
        run: |
          echo "📢 Deployment to production requires manual approval"
          echo "Review staging deployment at: https://staging.ledgr.ai"
          echo "Approve in GitHub Actions > Production environment"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [ build, approve-production ]
    if: github.ref == 'refs/heads/main'
    environment: production
    permissions:
      contents: read
      id-token: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ secrets.EKS_CLUSTER_NAME_PROD }} \
            --region ${{ env.AWS_REGION }}
      
      - name: Deploy to Kubernetes
        env:
          KUBE_NAMESPACE: ledgr
          FRONTEND_IMAGE: ${{ needs.build.outputs.frontend-image }}
          BACKEND_IMAGE: ${{ needs.build.outputs.backend-image }}
        run: |
          kubectl set image deployment/frontend \
            frontend=${{ env.FRONTEND_IMAGE }} \
            -n ${{ env.KUBE_NAMESPACE }} --record
          
          kubectl set image deployment/backend \
            backend=${{ env.BACKEND_IMAGE }} \
            -n ${{ env.KUBE_NAMESPACE }} --record
      
      - name: Wait for deployment
        run: |
          kubectl rollout status deployment/frontend \
            -n ledgr --timeout=10m
          kubectl rollout status deployment/backend \
            -n ledgr --timeout=10m
      
      - name: Run smoke tests
        run: |
          kubectl run test-pod --rm -i --restart=Never \
            --image=curlimages/curl -- curl http://frontend/health
      
      - name: Notify Slack on completion
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: Deployment to production ${{ job.status }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
          fields: repo,action,eventName
        continue-on-error: true

  post-deploy-monitoring:
    name: Monitor Post-Deployment Health
    runs-on: ubuntu-latest
    needs: deploy-production
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Wait for health checks
        run: sleep 30
      
      - name: Check application health
        run: |
          curl -f https://app.ledgr.ai/health || exit 1
          curl -f https://api.ledgr.ai/api/v1/health || exit 1
      
      - name: Check monitoring metrics
        run: |
          echo "✅ Monitoring dashboard: https://grafana.ledgr.ai"
          echo "✅ Error tracking: https://sentry.io"
          echo "✅ API metrics: https://prometheus.ledgr.ai"
