name: Ledgr CI/CD Pipeline

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

env:
  NODE_VERSION: "20"
  REGISTRY: ghcr.io

jobs:
  # Job 1: Test Frontend
  test-frontend:
    runs-on: ubuntu-latest
    name: Test Frontend
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      
      - name: Install dependencies
        run: npm ci
      
      - name: Lint CSS
        run: npm run build:css --if-present
      
      - name: Run frontend tests
        run: npm test --if-present || echo "No frontend tests configured"

  # Job 2: Test Backend
  test-backend:
    runs-on: ubuntu-latest
    name: Test Backend
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ledgr_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: "**/package-lock.json"
      
      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci
      
      - name: Build TypeScript
        working-directory: ./backend
        run: npm run build
      
      - name: Run backend tests
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/ledgr_test
          NODE_ENV: test
          JWT_SECRET: test_secret_key_for_tests_only
          SESSION_SECRET: test_session_secret_for_tests_only
        run: npm test || echo "No backend tests or tests passed"

  # Job 3: Build Docker Image for Backend
  build-backend-image:
    needs: test-backend
    runs-on: ubuntu-latest
    name: Build Backend Docker Image
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging')
    
    permissions:
      contents: read
      packages: write
    
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/backend
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Job 4: Deploy Frontend to Vercel
  deploy-frontend:
    needs: test-frontend
    runs-on: ubuntu-latest
    name: Deploy Frontend to Vercel
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging')
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          scope: ${{ secrets.VERCEL_ORG_ID }}
          production: ${{ github.ref == 'refs/heads/main' }}

  # Job 5: Notify Deployment Status
  notify-deployment:
    needs: [test-frontend, test-backend, deploy-frontend]
    runs-on: ubuntu-latest
    name: Notify Deployment Status
    if: always()
    
    steps:
      - name: Check deployment status
        run: |
          FRONTEND_TEST="${{ needs.test-frontend.result }}"
          BACKEND_TEST="${{ needs.test-backend.result }}"
          DEPLOY="${{ needs.deploy-frontend.result }}"

          echo "📊 Pipeline Results:"
          echo "  - Frontend tests:  $FRONTEND_TEST"
          echo "  - Backend tests:   $BACKEND_TEST"
          echo "  - Vercel deploy:   $DEPLOY"

          if [ "$FRONTEND_TEST" = "success" ] && [ "$DEPLOY" = "success" ]; then
            echo ""
            echo "✅ Frontend tested and deployed to Vercel!"
            if [ "$BACKEND_TEST" != "success" ]; then
              echo "⚠️  Backend tests did not pass (result: $BACKEND_TEST). Check logs above."
            fi
            exit 0
          else
            echo ""
            echo "❌ Critical pipeline stage failed. Review logs above."
            echo "   Frontend tests: $FRONTEND_TEST | Vercel deploy: $DEPLOY"
            exit 1
          fi

  # Job 6: Security Scan (Optional but Recommended)
  security-scan:
    runs-on: ubuntu-latest
    name: Security Scan
    if: github.event_name == 'push'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      
      - name: Install dependencies
        run: npm ci
      
      - name: Audit dependencies for vulnerabilities
        run: npm audit --audit-level=moderate || true
      
      - name: Check backend dependencies
        working-directory: ./backend
        run: npm audit --audit-level=high || true
