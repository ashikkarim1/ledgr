<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f9f9f9" media="(prefers-color-scheme: light)" />
    <title>Agent Dashboard — Ledgr</title>
    <meta name="description" content="Real-time agent status, activity feed, and financial metrics. Monitor your AI finance team." />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%230a0a0f'/%3E%3Ctext x='50%25' y='52%25' text-anchor='middle' dominant-baseline='middle' font-family='-apple-system,sans-serif' font-size='17' font-weight='600' fill='%23fbfaf7'%3EL%3C/text%3E%3C/svg%3E" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Newsreader:ital,opsz,wght@1,6..72,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="assets/tailwind-output.css" />
    <link rel="stylesheet" href="assets/styles.css" />
    <style>
      /* Dashboard Layout */
      .dashboard {
        min-height: 100vh;
        background: var(--paper);
      }

      .dashboard__header {
        background: var(--surface);
        border-bottom: 1px solid var(--line);
        padding: clamp(16px, 4vw, 32px) clamp(16px, 5vw, 40px);
        position: sticky;
        top: 0;
        z-index: 100;
      }

      .dashboard__header-inner {
        max-width: 1400px;
        margin: 0 auto;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
      }

      .dashboard__title {
        font-size: clamp(20px, 3vw, 28px);
        font-weight: 700;
        color: var(--ink-1);
        margin: 0;
      }

      .dashboard__mode-badge {
        display: inline-block;
        background: var(--accent-soft);
        color: var(--accent);
        padding: 6px 12px;
        border-radius: var(--radius-xs);
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .dashboard__main {
        max-width: 1400px;
        margin: 0 auto;
        padding: clamp(24px, 4vw, 48px) clamp(16px, 5vw, 40px);
      }

      /* Agent Status Cards */
      .agent-cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 20px;
        margin-bottom: 48px;
      }

      .agent-card {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: clamp(20px, 3vw, 28px);
        transition: all 0.3s var(--ease);
        cursor: pointer;
        position: relative;
        overflow: hidden;
      }

      .agent-card:hover {
        border-color: var(--accent);
        box-shadow: 0 8px 24px rgba(255, 92, 0, 0.08);
        transform: translateY(-2px);
      }

      .agent-card__header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        margin-bottom: 16px;
        gap: 12px;
      }

      .agent-card__title {
        font-size: 16px;
        font-weight: 600;
        color: var(--ink-1);
        margin: 0;
      }

      .agent-card__status {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .agent-card__status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        display: inline-block;
        animation: pulse 2s ease-in-out infinite;
      }

      .agent-card__status-dot.active {
        background: #10b981;
      }

      .agent-card__status-dot.processing {
        background: var(--accent);
      }

      .agent-card__status-dot.ready {
        background: #06b6d4;
      }

      .agent-card__metric {
        font-size: 32px;
        font-weight: 700;
        color: var(--accent);
        margin: 12px 0;
      }

      .agent-card__detail {
        font-size: 13px;
        color: var(--ink-2);
        line-height: 1.6;
        margin: 12px 0 0 0;
      }

      .agent-card__progress {
        margin-top: 16px;
      }

      .progress-bar {
        height: 6px;
        background: var(--line);
        border-radius: 3px;
        overflow: hidden;
      }

      .progress-fill {
        height: 100%;
        background: var(--accent);
        border-radius: 3px;
        transition: width 0.6s var(--ease);
      }

      .progress-label {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        color: var(--ink-2);
        margin-top: 6px;
      }

      /* Activity Feed */
      .activity-section {
        margin-bottom: 48px;
      }

      .section-title {
        font-size: clamp(18px, 2.5vw, 24px);
        font-weight: 700;
        color: var(--ink-1);
        margin: 0 0 20px 0;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .activity-feed {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        overflow: hidden;
      }

      .activity-item {
        padding: clamp(16px, 2vw, 24px);
        border-bottom: 1px solid var(--line);
        display: flex;
        gap: 16px;
        align-items: flex-start;
        transition: background 0.2s var(--ease);
      }

      .activity-item:last-child {
        border-bottom: none;
      }

      .activity-item:hover {
        background: var(--paper-2);
      }

      .activity-icon {
        width: 40px;
        height: 40px;
        border-radius: var(--radius-sm);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        flex-shrink: 0;
      }

      .activity-icon.success {
        background: rgba(16, 185, 129, 0.1);
        color: #10b981;
      }

      .activity-icon.warning {
        background: rgba(255, 92, 0, 0.1);
        color: var(--accent);
      }

      .activity-icon.waiting {
        background: rgba(6, 182, 212, 0.1);
        color: #06b6d4;
      }

      .activity-content {
        flex: 1;
        min-width: 0;
      }

      .activity-title {
        font-size: 14px;
        font-weight: 600;
        color: var(--ink-1);
        margin: 0 0 4px 0;
      }

      .activity-desc {
        font-size: 13px;
        color: var(--ink-2);
        margin: 0;
      }

      .activity-time {
        font-size: 12px;
        color: var(--ink-3);
        flex-shrink: 0;
        white-space: nowrap;
      }

      /* Quick Actions */
      .actions-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 16px;
      }

      .action-button {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        justify-content: space-between;
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: clamp(16px, 2vw, 24px);
        transition: all 0.3s var(--ease);
        text-align: left;
        min-height: 100px;
      }

      .action-button:hover {
        border-color: var(--accent);
        background: var(--paper-2);
        transform: translateY(-2px);
      }

      .action-button__label {
        font-size: 15px;
        font-weight: 600;
        color: var(--ink-1);
        margin: 0;
      }

      .action-button__badge {
        display: inline-block;
        background: var(--accent);
        color: white;
        padding: 4px 8px;
        border-radius: var(--radius-xs);
        font-size: 11px;
        font-weight: 700;
        margin-top: 8px;
      }

      /* Metrics Grid */
      .metrics-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 20px;
      }

      .metric-card {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: clamp(20px, 3vw, 28px);
        text-align: center;
      }

      .metric-value {
        font-size: clamp(28px, 5vw, 42px);
        font-weight: 700;
        color: var(--accent);
        margin: 0;
      }

      .metric-label {
        font-size: 13px;
        color: var(--ink-2);
        margin: 8px 0 0 0;
      }

      .metric-badge {
        display: inline-block;
        background: rgba(16, 185, 129, 0.1);
        color: #10b981;
        padding: 4px 8px;
        border-radius: var(--radius-xs);
        font-size: 11px;
        font-weight: 600;
        margin-top: 8px;
      }

      /* Pending Actions */
      .pending-list {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        overflow: hidden;
      }

      .pending-item {
        padding: clamp(16px, 2vw, 24px);
        border-bottom: 1px solid var(--line);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        transition: background 0.2s var(--ease);
      }

      .pending-item:last-child {
        border-bottom: none;
      }

      .pending-item:hover {
        background: var(--paper-2);
      }

      .pending-content {
        flex: 1;
        min-width: 0;
      }

      .pending-title {
        font-size: 14px;
        font-weight: 600;
        color: var(--ink-1);
        margin: 0 0 4px 0;
      }

      .pending-age {
        font-size: 12px;
        color: var(--ink-3);
      }

      .pending-priority {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 12px;
        border-radius: var(--radius-xs);
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        flex-shrink: 0;
      }

      .pending-priority.urgent {
        background: rgba(255, 64, 93, 0.1);
        color: var(--warn);
      }

      .pending-priority.review {
        background: rgba(255, 92, 0, 0.1);
        color: var(--accent);
      }

      .pending-priority.done {
        background: rgba(16, 185, 129, 0.1);
        color: #10b981;
      }

      /* Animations */
      @keyframes pulse {
        0%, 100% {
          opacity: 1;
        }
        50% {
          opacity: 0.7;
        }
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .agent-card,
      .activity-item,
      .metric-card,
      .action-button {
        animation: slideIn 0.4s var(--ease) both;
      }

      /* Responsive */
      @media (max-width: 640px) {
        .dashboard__header-inner {
          flex-direction: column;
          align-items: flex-start;
        }

        .agent-cards {
          grid-template-columns: 1fr;
        }

        .metrics-grid {
          grid-template-columns: 1fr;
        }

        .actions-grid {
          grid-template-columns: 1fr;
        }

        .activity-item {
          flex-direction: column;
        }

        .activity-time {
          white-space: normal;
        }

        .pending-item {
          flex-direction: column;
          align-items: flex-start;
        }

        .pending-priority {
          align-self: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <header class="nav" id="nav">
      <div class="wrap nav__inner">
        <a class="brand" href="index.html">
          <span class="brand__mark" aria-hidden="true">L</span>
          <span>Ledgr</span>
        </a>

        <nav class="nav__links" aria-label="Primary">
          <a href="index.html#platform">Platform</a>

    <main class="dashboard" id="dashboard">
      <header class="dashboard__header">
        <div class="dashboard__header-inner">
          <div>
            <h1 class="dashboard__title">Agent Dashboard</h1>
            <div class="dashboard__mode-badge" id="demo-badge" style="display: none;">Demo Mode</div>
          </div>
          <div id="auth-user-display" style="text-align: right;">
            <p style="font-size: 14px; color: var(--ink-2); margin: 0;">Demo Company LLC</p>
          </div>
        </div>
      </header>

      <div class="dashboard__main">
        <!-- Agent Team Status -->
        <section class="activity-section">
          <h2 class="section-title">
            <span>🤖</span>
            Agent Team Status
          </h2>
          <div class="agent-cards" id="agent-cards">
            <!-- Dynamically populated -->
          </div>
        </section>

        <!-- Quick Actions -->
        <section class="activity-section">
          <h2 class="section-title">
            <span>⚡</span>
            Quick Actions
          </h2>
          <div class="actions-grid" id="actions-grid">
            <!-- Dynamically populated -->
          </div>
        </section>

        <!-- Metrics Dashboard -->
        <section class="activity-section">
          <h2 class="section-title">
            <span>📊</span>
            Performance Metrics
          </h2>
          <div class="metrics-grid" id="metrics-grid">
            <!-- Dynamically populated -->
          </div>
        </section>

        <!-- Activity Feed -->
        <section class="activity-section">
          <h2 class="section-title">
            <span>📰</span>
            Real-time Activity
          </h2>
          <div class="activity-feed" id="activity-feed">
            <!-- Dynamically populated -->
          </div>
        </section>

        <!-- Pending User Actions -->
        <section class="activity-section">
          <h2 class="section-title">
            <span>✋</span>
            Pending Your Action
          </h2>
          <div class="pending-list" id="pending-list">
            <!-- Dynamically populated -->
          </div>
        </section>
      </div>
    </main>

    <script src="assets/app.js" defer></script>
    <script src="assets/dashboard.js" defer></script>
  </body>
</html>
