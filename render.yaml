services:
  - type: web
    name: ledgr-api
    env: node
    region: us-west
    plan: free
    buildCommand: "cd backend && npm install && npm run build"
    startCommand: "cd backend && npm run start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        fromDatabase:
          name: postgres
          property: password
      - key: DATABASE_URL
        fromDatabase:
          name: postgres
          property: connectionString
      - key: CORS_ORIGIN
        value: https://www.ledgr.ae
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: STRIPE_API_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
    
  - type: pserv
    name: postgres
    env: postgres
    ipAllowList: []
    plan: free
    region: us-west
    postgresVersion: "15"
    initialDatabase: ledgr_db
    user: ledgr_admin
